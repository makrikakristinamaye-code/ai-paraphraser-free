<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Free AI Paraphraser</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
    body{max-width:800px;margin:40px auto;padding:0 20px;background:#f9f9f9}
    .box{background:white;padding:24px;border-radius:12px;box-shadow:0 2px 10px #00000010;margin-bottom:16px}
    textarea{width:100%;height:180px;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
    button{background:#007bff;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px}
    button:hover{background:#0056b3}
    .result{margin-top:20px;padding:16px;background:#f1f1f1;border-radius:8px;min-height:100px;white-space:pre-wrap}
    .tg{margin-top:20px;text-align:center;color:#333}
    .tg a{color:#007bff;font-weight:bold}
    .limit{color:#666;font-size:14px;margin-bottom:10px}
    .pay-section{text-align:center;margin:20px 0}
    .pay-section h3{margin-bottom:12px;color:#333}
    .pay-btn{background:#222;padding:14px 40px;border-radius:30px;display:inline-block;margin:8px}
    .pay-btn:hover{background:#333}
    .api-section{margin-top:16px;padding:16px;background:#e8f5e9;border-radius:8px;text-align:center}
    .api-section input{width:280px;padding:10px;border:1px solid #ccc;border-radius:6px;margin:8px}
    .api-section button{background:#28a745}
    .api-section button:hover{background:#1e7e34}
    .nav{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
    .nav button{background:#6c757d;padding:8px 20px}
    .nav button.active{background:#007bff}
    .hidden{display:none}
    .badge{background:#ffc107;color:#333;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:bold}




    .admin-section{display:none;margin-top:16px;padding:16px;background:#f0f0f0;border-radius:8px}
    .admin-section input{width:250px;padding:10px;border:1px solid #ccc;border-radius:6px;margin:4px}
    .admin-section table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .admin-section th,.admin-section td{border:1px solid #ddd;padding:8px;text-align:left}
    .admin-section th{background:#007bff;color:white}
    .admin-section tr:nth-child(even){background:#f9f9f9}
    .admin-btn{background:#6c757d;padding:6px 14px;font-size:13px}
    .admin-link{color:#6c757d;font-size:12px;cursor:pointer;text-decoration:underline}
  </style>
</head>
<body>
  <div class="nav">
    <button onclick="showTab('tool')" id="tabTool" class="active">Paraphrase Tool</button>
    <button onclick="showTab('pricing')" id="tabPricing">Pricing and Unlock</button>
  </div>




  <div id="tabToolContent">
    <div class="box">
      <h2>Free AI Paraphraser | Rewrite Text</h2>
  <script>
    let count = parseInt(localStorage.getItem("paraCount") || "0");
    let resetDate = localStorage.getItem("paraDate") || "";
    const today = new Date().toDateString();
    if(resetDate !== today) { count = 0; localStorage.setItem("paraCount", "0"); localStorage.setItem("paraDate", today); }
    document.getElementById("usedCount").innerText = count;

    let selectedPlan = 5;
    let selectedCredits = 10000;
    let selectedNetwork = 'trc20';

    const NETWORKS = {
      trc20: { label: 'TRC-20 (Tron)', addr: 'TYtZx8vNiFSkPBXvFnyeG4kjsKN4bPB9t3' },
      bsc: { label: 'BSC (BEP-20)', addr: '0xFb6A4d13f8850D62F0d0b192a5d0FE707c8D700e' },
      erc20: { label: 'ERC-20 (Ethereum)', addr: '0xFb6A4d13f8850D62F0d0b192a5d0FE707c8D700e' }
    };

    function selectPlan(usd, credits) {
      selectedPlan = usd; selectedCredits = credits;
      document.querySelectorAll('[id^="plan"]').forEach(el => el.style.borderColor = '#ddd');
      const el = document.getElementById('plan' + usd);
      if (el) el.style.borderColor = '#007bff';
      document.getElementById('payAddressSection').style.display = 'none';
    }

    function selectNetwork(net) {
      selectedNetwork = net;
      const c = NETWORKS[net]; if (!c) return;
      document.querySelectorAll('[id^="net"]').forEach(el => { el.style.borderColor = '#ddd'; el.style.background = 'transparent'; });
      const el = document.getElementById('net' + net.charAt(0).toUpperCase() + net.slice(1));
      if (el) { el.style.borderColor = '#28a745'; el.style.background = '#f0fff0'; }
      document.getElementById('selectedNetworkLabel').innerText = c.label;
      document.getElementById('payAddress').innerText = c.addr;
      document.getElementById('payAddress').dataset.addr = c.addr;
      document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(c.addr);
    }

    function showPayAddress() {
      const email = document.getElementById('buyEmail').value.trim();
      if (!email || !email.includes('@')) return alert('Please enter a valid email address');
      document.getElementById('payAmountDisplay').innerText = '$' + selectedPlan;
      document.getElementById('payAddressSection').style.display = 'block';
      selectNetwork(selectedNetwork);
    }

    function copyAddress() {
      const c = NETWORKS[selectedNetwork];
      navigator.clipboard.writeText(c ? c.addr : 'TYtZx8vNiFSkPBXvFnyeG4kjsKN4bPB9t3').then(() => alert('Copied!')).catch(() => alert('Copy manually'));
    }

    async function claimKey() {
      const email = document.getElementById('buyEmail').value.trim();
      if (!email) return alert('Enter your email first');
      document.getElementById('claimMsg').innerHTML = 'Checking...';
      const res = await fetch('/api/proxy', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'claimKey', email, plan:'usdt_' + selectedPlan}) });
      const data = await res.json();
      if (data.apiKey) document.getElementById('claimMsg').innerHTML = 'API Key sent to ' + email + '! Check your inbox.';
      else if (data.status === 'pending') document.getElementById('claimMsg').innerHTML = 'USDT not detected. Wait or DM @Alexis.';
      else document.getElementById('claimMsg').innerHTML = data.error || 'Error. DM @Alexis.';
    }

    if (window.location.search.includes('admin=bw4admin2026')) {
      setTimeout(function() { document.getElementById('adminPanel').style.display = 'block'; document.getElementById('adminBtn').style.display = 'none'; adminRefresh(); }, 500);
    }

    async function adminRegister() {
      const email = document.getElementById('regEmail').value; const credits = parseInt(document.getElementById('regCredits').value);
      if (!email) return alert('Enter email');
      const res = await fetch('/api/proxy', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'register', admin:'bw4admin2026', email, credits}) });
      const data = await res.json();
      document.getElementById('regResult').innerHTML = data.apiKey ? 'Key: ' + data.apiKey : data.error || 'Error';
    }

    async function adminTopup() {
      const email = document.getElementById('topupEmail').value; const credits = parseInt(document.getElementById('topupAmount').value);
      if (!email) return alert('Enter email');
      const res = await fetch('/api/proxy', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'addCredits', admin:'bw4admin2026', email, credits}) });
      const data = await res.json();
      document.getElementById('topupResult').innerHTML = data.totalCredits ? 'Total: ' + data.totalCredits + ', Used: ' + data.used : data.error || 'Error';
    }

    async function adminRefresh() {
      const res = await fetch('/api/proxy?admin=bw4admin2026');
      const data = await res.json();
      let h = '<p>Total: ' + (data.totalRequests || 0) + ' | Paid: ' + (data.paidUsers ? data.paidUsers.length : 0) + '</p>';
      if (data.paidUsers && data.paidUsers.length > 0) {
        h += '<table><tr><th>Email</th><th>Key</th><th>Used</th><th>Remaining</th></tr>';
        data.paidUsers.forEach(u => { h += '<tr><td>' + u.email + '</td><td>' + u.apiKey + '</td><td>' + u.used + '</td><td>' + u.remaining + '</td></tr>'; });
        h += '</table>';
      }
      document.getElementById('adminStats').innerHTML = h;
    }

    function showTab(tab) {
      document.getElementById("tabToolContent").classList.add("hidden");
      document.getElementById("tabPricingContent").classList.add("hidden");
      document.getElementById("tabTool").classList.remove("active");
      document.getElementById("tabPricing").classList.remove("active");
      if(tab === "tool") { document.getElementById("tabToolContent").classList.remove("hidden"); document.getElementById("tabTool").classList.add("active"); }
      else { document.getElementById("tabPricingContent").classList.remove("hidden"); document.getElementById("tabPricing").classList.add("active"); }
    }

    async function rewrite() {
      let text = document.getElementById("input").value;
      if(!text) return alert("Enter text");
      if(count >= 3) { document.getElementById("result").innerHTML = 'Daily limit reached.'; return; }
      document.getElementById("result").innerText = "Processing...";
      const res = await fetch("/api/proxy", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({text}) });
      const data = await res.json();
      document.getElementById("result").innerText = data.result || "Error.";
      count++; localStorage.setItem("paraCount", String(count)); document.getElementById("usedCount").innerText = count;
    }

    function unlockWithKey() {
      const key = document.getElementById("apiKeyInput").value.trim();
      if (!key) return alert("Enter your API Key");
      localStorage.setItem("myApiKey", key);
      alert("API Key saved!");
    }

    function clearKey() {
      localStorage.removeItem("myApiKey");
      alert("Key cleared");
    }
  </script>

  <div id="adminPanel" class="admin-section" style="display:none">
    <h3>Admin Dashboard</h3>
    <h4>Register</h4>
    <input type="email" id="regEmail" placeholder="Email">
    <select id="regCredits" style="padding:10px;border:1px solid #ccc;border-radius:6px">
      <option value="5000">$3 - 5k</option><option value="10000" selected>$5 - 10k</option><option value="25000">$10 - 25k</option>
    </select>
    <button onclick="adminRegister()">Register</button>
    <p id="regResult"></p>
    <h4>Top Up</h4>
    <input type="email" id="topupEmail" placeholder="Email">
    <input type="number" id="topupAmount" value="5000" style="width:120px">
    <button onclick="adminTopup()">Add</button>
    <p id="topupResult"></p>
    <h4>Usage</h4>
    <div id="adminStats">Loading...</div>
    <button onclick="adminRefresh()">Refresh</button>
  </div>
</body>
</html>
